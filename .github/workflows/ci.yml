name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    env:
      RUBY_VERSION: 3.3.10
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('**/.rubocop.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.RUBY_VERSION }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: rubocop-${{ runner.os }}-${{ env.RUBY_VERSION }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint
        run: bin/rubocop -f github

  test:
    name: RSpec
    runs-on: ubuntu-latest
    env:
      RUBY_VERSION: 3.3.10
      RAILS_ENV: test
      DATABASE_USER: postgres
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hookshot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Set up database
        run: |
          cd spec/dummy
          PGPASSWORD=postgres bundle exec rails db:create db:migrate
        env:
          DATABASE_USER: postgres
          PGPASSWORD: postgres

      - name: Run specs
        run: bundle exec rspec
        env:
          DATABASE_USER: postgres
          PGPASSWORD: postgres
